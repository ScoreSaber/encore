name: Release

on:
   workflow_dispatch:
      inputs:
         bump:
            description: Version bump to use when the package version already has a release
            required: true
            default: patch
            type: choice
            options:
               - patch
               - minor
               - major

permissions:
   contents: write

concurrency:
   group: release-${{ github.ref }}
   cancel-in-progress: false

jobs:
   version:
      name: Resolve version
      runs-on: ubuntu-latest
      outputs:
         version: ${{ steps.version.outputs.version }}
         tag: ${{ steps.version.outputs.tag }}
         sha: ${{ steps.version.outputs.sha }}
      steps:
         - name: Checkout
           uses: actions/checkout@v4
           with:
              fetch-depth: 0

         - name: Setup Node
           uses: actions/setup-node@v4
           with:
              node-version: 24

         - name: Resolve release version
           id: version
           env:
              GH_TOKEN: ${{ github.token }}
              BUMP: ${{ inputs.bump }}
           run: |
              set -euo pipefail

              if [[ "${GITHUB_REF_TYPE:-}" != "branch" ]]; then
                 echo "::error::Release workflow must be run from a branch."
                 exit 1
              fi

              current_version="$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")"

              if [[ ! "$current_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                 echo "::error::package.json version must be a plain x.y.z semver version, got $current_version"
                 exit 1
              fi

              version="$current_version"
              tag="v$version"

              if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
                 IFS=. read -r major minor patch <<< "$current_version"

                 case "$BUMP" in
                    patch)
                       patch=$((patch + 1))
                       ;;
                    minor)
                       minor=$((minor + 1))
                       patch=0
                       ;;
                    major)
                       major=$((major + 1))
                       minor=0
                       patch=0
                       ;;
                    *)
                       echo "::error::Unknown bump type: $BUMP"
                       exit 1
                       ;;
                 esac

                 version="$major.$minor.$patch"
                 tag="v$version"

                 if gh release view "$tag" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
                    echo "::error::Release $tag already exists. Update package.json or choose a different bump."
                    exit 1
                 fi

                 if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
                    echo "::error::Tag $tag already exists without a GitHub release. Resolve it before releasing."
                    exit 1
                 fi

                 VERSION="$version" node --input-type=module <<'NODE'
              import { readFileSync, writeFileSync } from "node:fs";

              const packagePath = "package.json";
              const pkg = JSON.parse(readFileSync(packagePath, "utf8"));
              pkg.version = process.env.VERSION;
              writeFileSync(packagePath, `${JSON.stringify(pkg, null, 3)}\n`);
              NODE

                 git config user.name "github-actions[bot]"
                 git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                 git add package.json
                 git commit -m "release: v$version"
                 git push origin "HEAD:${GITHUB_REF_NAME}"
              else
                 if git ls-remote --exit-code --tags origin "refs/tags/$tag" >/dev/null 2>&1; then
                    git fetch --force --tags origin "refs/tags/$tag:refs/tags/$tag"

                    local_tag_sha="$(git rev-list -n 1 "$tag")"
                    current_sha="$(git rev-parse HEAD)"

                    if [[ "$local_tag_sha" != "$current_sha" ]]; then
                       echo "::error::Tag $tag exists but does not point at the current commit. Resolve it before releasing."
                       exit 1
                    fi
                 fi
              fi

              sha="$(git rev-parse HEAD)"

              echo "version=$version" >> "$GITHUB_OUTPUT"
              echo "tag=$tag" >> "$GITHUB_OUTPUT"
              echo "sha=$sha" >> "$GITHUB_OUTPUT"

              echo "Resolved $tag at $sha"

   build:
      name: Build app
      needs: version
      runs-on: ubuntu-latest
      steps:
         - name: Checkout
           uses: actions/checkout@v4
           with:
              ref: ${{ needs.version.outputs.sha }}

         - name: Setup Node
           uses: actions/setup-node@v4
           with:
              node-version: 24

         - name: Setup Bun
           uses: oven-sh/setup-bun@v2
           with:
              bun-version: 1.3.14

         - name: Cache package downloads
           uses: actions/cache@v4
           with:
              path: |
                 ~/.bun/install/cache
                 ~/.cache/electron
                 ~/.cache/electron-builder
                 ~/Library/Caches/electron
                 ~/Library/Caches/electron-builder
                 ~/AppData/Local/electron/Cache
                 ~/AppData/Local/electron-builder/Cache
              key: release-build-${{ runner.os }}-${{ hashFiles('bun.lock') }}
              restore-keys: |
                 release-build-${{ runner.os }}-

         - name: Install dependencies
           run: bun install --frozen-lockfile

         - name: Build app
           run: bun run build

         - name: Archive app build
           run: tar -czf encore-out.tar.gz out

         - name: Upload app build
           uses: actions/upload-artifact@v4
           with:
              name: app-out
              path: encore-out.tar.gz
              if-no-files-found: error
              retention-days: 1
              compression-level: 0

   package:
      name: Build ${{ matrix.name }}
      needs:
         - version
         - build
      runs-on: ${{ matrix.os }}
      strategy:
         fail-fast: false
         matrix:
            include:
               - name: macOS DMGs
                 os: macos-latest
                 package_args: --mac dmg zip --x64 --arm64
                 artifact: encore-macos
                 artifact_paths: |
                    release/*.dmg
                    release/*.zip
                    release/latest-mac.yml
                    release/*.blockmap
                 flatpak: false
                 linux_packages: ''
               - name: Windows x64 EXE
                 os: windows-latest
                 package_args: --win nsis --x64
                 artifact: encore-windows-x64
                 artifact_paths: |
                    release/*.exe
                    release/latest.yml
                    release/*.blockmap
                 flatpak: false
                 linux_packages: ''
               - name: Linux x86_64 packages
                 os: ubuntu-latest
                 package_args: --linux AppImage deb rpm --x64
                 artifact: encore-linux-x86_64
                 artifact_paths: |
                    release/*.AppImage
                    release/*.deb
                    release/*.rpm
                    release/latest-linux.yml
                    release/*.blockmap
                 flatpak: false
                 linux_packages: libarchive-tools rpm xz-utils
               - name: Linux x86_64 Flatpak
                 os: ubuntu-latest
                 package_args: --linux flatpak --x64
                 artifact: encore-linux-flatpak
                 artifact_paths: release/*.flatpak
                 flatpak: true
                 linux_packages: flatpak flatpak-builder xz-utils
      steps:
         - name: Checkout
           uses: actions/checkout@v4
           with:
              ref: ${{ needs.version.outputs.sha }}

         - name: Setup Node
           uses: actions/setup-node@v4
           with:
              node-version: 24

         - name: Setup Bun
           uses: oven-sh/setup-bun@v2
           with:
              bun-version: 1.3.14

         - name: Cache package downloads
           uses: actions/cache@v4
           with:
              path: |
                 ~/.bun/install/cache
                 ~/.cache/electron
                 ~/.cache/electron-builder
                 ~/Library/Caches/electron
                 ~/Library/Caches/electron-builder
                 ~/AppData/Local/electron/Cache
                 ~/AppData/Local/electron-builder/Cache
              key: release-package-${{ runner.os }}-${{ hashFiles('bun.lock') }}
              restore-keys: |
                 release-package-${{ runner.os }}-
                 release-build-${{ runner.os }}-

         - name: Install dependencies
           run: bun install --frozen-lockfile

         - name: Download app build
           uses: actions/download-artifact@v4
           with:
              name: app-out
              path: .release-build

         - name: Restore app build
           shell: bash
           run: tar -xzf .release-build/encore-out.tar.gz

         - name: Cache Flatpak runtimes
           if: matrix.flatpak
           uses: actions/cache@v4
           with:
              path: ~/.local/share/flatpak
              key: flatpak-25.08-${{ runner.os }}

         - name: Install Linux package tools
           if: matrix.linux_packages != ''
           run: |
              sudo apt-get update
              sudo apt-get install --no-install-recommends -y ${{ matrix.linux_packages }}

         - name: Install Flatpak runtimes
           if: matrix.flatpak
           run: |
              flatpak remote-add --if-not-exists --user flathub https://flathub.org/repo/flathub.flatpakrepo
              flatpak install --user --noninteractive --arch=x86_64 flathub \
                 org.freedesktop.Platform//25.08 \
                 org.freedesktop.Sdk//25.08 \
                 org.electronjs.Electron2.BaseApp//25.08

         - name: Package app
           shell: bash
           env:
              APPIMAGE_EXTRACT_AND_RUN: '1'
           run: bunx electron-builder ${{ matrix.package_args }} --publish never

         - name: Upload release asset
           uses: actions/upload-artifact@v4
           with:
              name: ${{ matrix.artifact }}
              path: ${{ matrix.artifact_paths }}
              if-no-files-found: error
              retention-days: 7
              compression-level: 0

   release:
      name: Publish release
      needs:
         - version
         - package
      runs-on: ubuntu-latest
      steps:
         - name: Download release assets
           uses: actions/download-artifact@v4
           with:
              path: artifacts
              pattern: encore-*

         - name: Create GitHub release
           env:
              GH_TOKEN: ${{ github.token }}
              TAG: ${{ needs.version.outputs.tag }}
              VERSION: ${{ needs.version.outputs.version }}
              SHA: ${{ needs.version.outputs.sha }}
           run: |
              set -euo pipefail
              mapfile -t assets < <(find artifacts -type f | sort)

              if (( ${#assets[@]} == 0 )); then
                 echo "::error::No release assets were downloaded."
                 exit 1
              fi

              cat > release-notes.md <<'NOTES'
              _We're in super early development. None of what you expect has been implemented in the slightest. Downloading and attempting to use a release right now is the equivalent of installing a brick, except a brick has more use cases_

              NOTES

              gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
                 -f tag_name="$TAG" \
                 -f target_commitish="$SHA" \
                 --jq .body >> release-notes.md

              gh release create "$TAG" "${assets[@]}" \
                 --repo "$GITHUB_REPOSITORY" \
                 --target "$SHA" \
                 --title "Encore v$VERSION" \
                 --notes-file release-notes.md
